<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrice automatisation — Rampal / CDP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;padding:24px;color:#222}
h2{font-size:13px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
svg{width:100%;height:auto;display:block}
.tooltip{position:fixed;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:240px;z-index:999;line-height:1.6;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.tooltip strong{display:block;font-size:13px;font-weight:600;color:#111;margin-bottom:3px}
.tooltip em{color:#777;font-style:normal}
.legende{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.legende-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#555}
.legende-cercle{width:12px;height:12px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<h2>Matrice effort / impact — Automatisation comptable Rampal · CDP</h2>
<div class="tooltip" id="tt"></div>
<svg viewBox="0 0 620 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#bbb"/>
    </marker>
  </defs>
  <rect x="62" y="22" width="238" height="148" fill="#EAF3DE" rx="6"/>
  <rect x="302" y="22" width="258" height="148" fill="#FEF3E2" rx="6"/>
  <rect x="62" y="172" width="238" height="148" fill="#F5F5F3" rx="6"/>
  <rect x="302" y="172" width="258" height="148" fill="#FEF0EB" rx="6"/>
  <line x1="62" y1="172" x2="554" y2="172" stroke="#ccc" stroke-width=".8" marker-end="url(#arr)"/>
  <line x1="182" y1="316" x2="182" y2="17" stroke="#ccc" stroke-width=".8" marker-end="url(#arr)"/>
  <text x="182" y="334" text-anchor="middle" font-size="11" fill="#999">Effort faible</text>
  <text x="540" y="334" text-anchor="middle" font-size="11" fill="#999">Effort élevé</text>
  <text x="16" y="175" text-anchor="middle" font-size="11" fill="#999" transform="rotate(-90 16 175)">Impact fort</text>
  <text x="182" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#3B6D11">Gains immédiats</text>
  <text x="430" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">Chantiers structurants</text>
  <text x="182" y="192" text-anchor="middle" font-size="11" fill="#999">Améliorations secondaires</text>
  <text x="430" y="192" text-anchor="middle" font-size="11" fill="#B45309">À réexaminer</text>
  <g class="pt" data-id="1" style="cursor:pointer"><circle cx="122" cy="70" r="18" fill="#6ECC9C" stroke="#2D8A5E" stroke-width="1"/><text x="122" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#0F4D2E">1</text></g>
  <g class="pt" data-id="2" style="cursor:pointer"><circle cx="170" cy="100" r="18" fill="#6ECC9C" stroke="#2D8A5E" stroke-width="1"/><text x="170" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#0F4D2E">2</text></g>
  <g class="pt" data-id="3" style="cursor:pointer"><circle cx="240" cy="82" r="18" fill="#6ECC9C" stroke="#2D8A5E" stroke-width="1"/><text x="240" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#0F4D2E">3</text></g>
  <g class="pt" data-id="4" style="cursor:pointer"><circle cx="118" cy="145" r="15" fill="#D3D1C7" stroke="#888" stroke-width="1"/><text x="118" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#333">4</text></g>
  <g class="pt" data-id="5" style="cursor:pointer"><circle cx="360" cy="58" r="20" fill="#F6C26B" stroke="#B45309" stroke-width="1"/><text x="360" y="63" text-anchor="middle" font-size="12" font-weight="700" fill="#5C2D00">5</text></g>
  <g class="pt" data-id="6" style="cursor:pointer"><circle cx="510" cy="80" r="20" fill="#F6C26B" stroke="#B45309" stroke-width="1"/><text x="510" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#5C2D00">6</text></g>
  <g class="pt" data-id="7" style="cursor:pointer"><circle cx="155" cy="248" r="14" fill="#D3D1C7" stroke="#888" stroke-width="1"/><text x="155" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#333">7</text></g>
  <g class="pt" data-id="8" style="cursor:pointer"><circle cx="355" cy="125" r="16" fill="#F6C26B" stroke="#B45309" stroke-width="1"/><text x="355" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#5C2D00">8</text></g>
</svg>
<div class="legende">
  <div class="legende-item"><div class="legende-cercle" style="background:#6ECC9C;border:1px solid #2D8A5E"></div>Gain immédiat</div>
  <div class="legende-item"><div class="legende-cercle" style="background:#F6C26B;border:1px solid #B45309"></div>Chantier structurant</div>
  <div class="legende-item"><div class="legende-cercle" style="background:#D3D1C7;border:1px solid #888"></div>Préalable / secondaire</div>
</div>
<script>
const infos={
  1:{t:"Connecteur Prestashop → Sage Compta (CDP)",e:"Faible",i:"Élevé",n:"Supprime la saisie quotidienne de Gaëlle grâce à un module natif ou un pont applicatif."},
  2:{t:"Rapprochement bancaire automatisé (CDP)",e:"Faible",i:"Élevé",n:"Stripe, Paypal et Amazon ont des interfaces de programmation documentées. Gain estimé : 3 à 4 h/semaine."},
  3:{t:"Suppression retraitement tableur CA Retail (Rampal)",e:"Faible–Moyen",i:"Élevé",n:"Flux direct Odoo → LSI, sans passage par un tableur intermédiaire."},
  4:{t:"Documentation des procédures Aurélie & Gaëlle",e:"Faible",i:"Moyen",n:"Préalable indispensable à toute automatisation. Réduit le risque de dépendance sur une seule personne."},
  5:{t:"Facturation électronique obligatoire 2026",e:"Moyen",i:"Critique",n:"Mise en conformité légale non négociable. Choix d'une plateforme de dématérialisation partenaire à engager dès maintenant."},
  6:{t:"Migration vers un progiciel de gestion intégré unifié",e:"Élevé",i:"Élevé",n:"Cible à 18 mois. À engager après stabilisation des flux et documentation des procédures."},
  7:{t:"Dématérialisation des bons de réception papier",e:"Faible",i:"Faible–Moyen",n:"Réception numérique via code matriciel. Utile, non prioritaire."},
  8:{t:"Automatisation commandes fournisseurs B2B (CDP)",e:"Moyen",i:"Élevé",n:"Portail de commande ou échange de données informatisé. Dépend du volume B2B CDP."}
};
const tt=document.getElementById('tt');
document.querySelectorAll('.pt').forEach(g=>{
  g.addEventListener('mouseenter',()=>{
    const d=infos[g.dataset.id];
    tt.innerHTML=`<strong>${d.t}</strong><em>Effort : ${d.e} · Impact : ${d.i}</em><br>${d.n}`;
    tt.style.opacity='1';
  });
  g.addEventListener('mousemove',e=>{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';});
  g.addEventListener('mouseleave',()=>{tt.style.opacity='0';});
});
</script>
</body>
</html>
